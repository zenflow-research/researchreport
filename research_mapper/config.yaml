# Research Report Mapper Configuration
# Maps downloaded Telegram research reports to companies in G:/brain

paths:
  # Source: downloaded research reports
  download_dir: "F:/2_Telegram_Download"
  # Target: brain company master data
  brain_dir: "G:/brain"
  master_csv: "G:/brain/screener_util/company_sector_mapping_merged_master.csv"
  screener_db: "G:/brain/data/screener_cloud.db"
  # Output
  output_dir: "G:/Telegram/research_mapper/output"
  mapping_db: "G:/Telegram/research_mapper/output/report_mapping.db"

